[program:tradeflow]
command=/var/www/tradeflow/backend/venv/bin/uvicorn app.main:app --host 127.0.0.1 --port 8000 --workers 2
directory=/var/www/tradeflow/backend
user=www-data
autostart=true
autorestart=true
stderr_logfile=/var/log/tradeflow/err.log
stdout_logfile=/var/log/tradeflow/out.log
environment=PYTHONPATH="/var/www/tradeflow/backend"
